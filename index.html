                                    outcome: "The module is genuinely interesting, and working alongside Andy deepens your collaboration. But you find yourself occasionally wondering about the Music module. You realize that sometimes the useful choice and the curious choice are different — and both have value."
                                },
                                {
                                    label: "B: Take Music. Follow the curiosity, even without knowing where it leads.",
                                    outcome: "The Music module surprises you. Acoustics turns out to connect to the physics of sound in enclosed spaces — and you find yourself thinking about how hawker stalls amplify noise differently. Curiosity led you to an unexpected connection. You learn that the best learning often comes from following what intrigues you, not what's obviously useful."
                                },
                                {
                                    label: "C: Ask Ms Tan whether it's better to choose what's useful now or what you're genuinely curious about.",
                                    outcome: "Ms Tan smiles. \"Both matter,\" she says. \"But I'd ask you this: which one will you regret not taking?\" You sit with that for a moment. It's not a question she can answer for you. It's a question only you can answer. And that's the point."
                                }
                            ],
                            reflectivePrompt: "When you make choices about learning, what do you tend to prioritise — usefulness, curiosity, or connection with others?"
                        },
                        {
                            id: 10,
                            number: 10,
                            question: "Looking Back, Looking Forward",
                            preamble: "It's near the end of Secondary 4. You and Andy are putting the finishing touches on your portfolios. Ms Tan has asked you each to write a reflection — not just about what you found, but about who you became in the process of finding it. You think back to Primary 5, to the reading corner, to the canteen project, to this last year. Who are you now?",
                            options: [
                                {
                                    label: "A: Write about the skills you've developed — the research methods, the data analysis, the collaboration strategies.",
                                    outcome: "Your reflection is clear and well-evidenced. Ms Tan affirms your growth. She also asks, \"And what do these skills mean to you — beyond school?\" You find yourself thinking about what comes next. Not what you should do, but what you're capable of doing. And that's a different question."
                                },
                                {
                                    label: "B: Write about the moments that were hardest — and what you learned from not giving up on them.",
                                    outcome: "Your reflection is honest and a little raw. Ms Tan reads it carefully. \"This is the kind of reflection that takes courage,\" she says. \"You've learned something more important than any skill — you've learned that struggle is part of learning, not a sign you're doing it wrong.\""
                                },
                                {
                                    label: "C: Write about who you are becoming — what kind of learner, what kind of person, and what kind of future you're starting to imagine for yourself.",
                                    outcome: "Your reflection is the hardest to write, but the most yours. You write about the boy who was confused by shapes in Primary 5, and the teenager who is now comfortable with complexity. You write about someone who asks questions before jumping in, who listens to people, who can change their mind. And you realize that's the real project — learning to be someone who learns."
                                }
                            ],
                            reflectivePrompt: "What feels most true to where you are right now?"
                        }
                    ],
                    endScene: "You close your portfolio. Andy is still writing beside you, his pen moving steadily. Outside the library window, the school is going about its afternoon — students heading to class, teachers carrying stacks of papers, the canteen already busy with the early lunch rush. You've spent years in this place. You've made choices, some easy and some hard. You've learned things — about math, about communities, about yourself. And the most important realization isn't about any of those things separately. It's that they're all connected. That learning is about becoming. That the person you are learning to be is the most important question of all. What comes next? You don't know yet. But you're less afraid of not knowing now. You've learned to ask good questions. And maybe that's enough to begin with."
                }
            ]
        };

        const closingNote = "Throughout this game, you were never asked to get the \"right\" answer. You were asked to make choices — and to notice, even briefly, why you made them.\n\nThat noticing is the real learning. Not the choices themselves, but your awareness of what guided them. Your values. Your fears. Your curiosity. Your care for others.\n\nYou are Gabriel — and you are becoming someone. The story doesn't end here. But you've started to see the pattern. How you learn. How you choose. How you grow.\n\nWhoever reads this and recognizes themselves in Gabriel — this is for you. Keep noticing. Keep asking questions. Keep changing your mind when evidence demands it. Keep listening to people, especially when they disagree with you. Keep following your curiosity, even when it seems impractical.\n\nThe learning journey doesn't end when you leave school. It begins there.";

        // ============================================================================
        // GAME STATE & PERSISTENCE
        // ============================================================================

        let gameState = {
            currentView: 'welcome',
            currentSceneId: null,
            currentChoiceIndex: 0,
            choicesMade: [],
            outcomesRevealed: false
        };

        const STORAGE_KEY = 'narrativeGameState';
        const AUTOSAVE_INTERVAL = 5000; // 5 seconds

        function saveGame() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
                showSaveIndicator();
            } catch (e) {
                console.warn('Failed to save game state:', e);
            }
        }

        function loadGame() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    gameState = JSON.parse(saved);
                    return true;
                }
            } catch (e) {
                console.warn('Failed to load game state:', e);
            }
            return false;
        }

        function showSaveIndicator() {
            const indicator = document.getElementById('saveIndicator');
            indicator.classList.add('show');
            setTimeout(() => {
                indicator.classList.remove('show');
            }, 3000);
        }

        function clearSavedGame() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {
                console.warn('Failed to clear saved game:', e);
            }
        }

        // ============================================================================
        // EVENT DELEGATION
        // ============================================================================

        document.addEventListener('click', (event) => {
            const target = event.target;

            // Choice button handler
            if (target.classList.contains('choice-btn')) {
                const sceneId = parseInt(target.dataset.sceneId, 10);
                const choiceId = parseInt(target.dataset.choiceId, 10);
                const optionLabel = target.dataset.optionLabel;
                const outcome = target.dataset.outcome;
                selectOption(sceneId, choiceId, optionLabel, outcome);
            }

            // Continue button for next choice
            if (target.classList.contains('continue-btn-next-choice')) {
                const sceneId = parseInt(target.dataset.sceneId, 10);
                const choiceIndex = parseInt(target.dataset.choiceIndex, 10);
                showNextChoice(sceneId, choiceIndex);
            }

            // Continue button for scene end
            if (target.classList.contains('continue-btn-scene-end')) {
                const sceneId = parseInt(target.dataset.sceneId, 10);
                showSceneEnd(sceneId);
            }

            // Start game button
            if (target.id === 'startGameBtn') {
                startGame();
            }

            // Show summary button
            if (target.id === 'showSummaryBtn') {
                showSummary();
            }

            // Restart game button
            if (target.id === 'restartGameBtn') {
                restartGame();
            }
        });

        // ============================================================================
        // RENDER FUNCTIONS
        // ============================================================================

        function renderWelcome() {
            const content = `
                <div class="welcome-screen">
                    <h1>${storyData.welcome.title}</h1>
                    <p class="subtitle">${storyData.welcome.subtitle}</p>
                    <div class="section-divider"></div>
                    <h2>How to Play</h2>
                    <div class="how-to-play">
                        ${storyData.welcome.howToPlay.map(p => `<p>${p}</p>`).join('')}
                    </div>
                    <button class="continue-btn" id="startGameBtn">Begin Your Journey</button>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = content;
            document.getElementById('choiceLog').innerHTML = '<p style="color: #999; font-size: 13px;">Your choices will appear here as you play.</p>';
            window.scrollTo(0, 0);
        }

        function renderScene(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            if (!scene) return;

            gameState.currentSceneId = sceneId;
            gameState.currentChoiceIndex = 0;
            gameState.outcomesRevealed = false;

            const settingHtml = `<div class="scene-setting">${scene.setting}</div>`;
            const choiceHtml = renderChoice(scene, 0);

            const content = `
                <h2>${scene.title}</h2>
                ${settingHtml}
                <div id="choiceContainer">${choiceHtml}</div>
            `;

            document.getElementById('mainContent').innerHTML = content;
            window.scrollTo(0, 0);
        }

        function renderChoice(scene, choiceIndex) {
            const choice = scene.choices[choiceIndex];
            if (!choice) return '';

            const preamble = choice.preamble ? `<p>${choice.preamble}</p>` : '';
            const reflectivePrompt = choice.reflectivePrompt ? `<div class="reflective-prompt">${choice.reflectivePrompt}</div>` : '';
            
            const optionsHtml = choice.options.map((opt) => {
                const optionLetter = opt.label.split(':')[0].trim();
                return `
                    <button class="choice-btn" 
                        data-scene-id="${gameState.currentSceneId}" 
                        data-choice-id="${choice.id}" 
                        data-option-label="${optionLetter}"
                        data-outcome="${escapeHtml(opt.outcome)}">
                        ${opt.label}
                    </button>
                `;
            }).join('');

            return `
                <div class="choice-point">
                    <div class="choice-question">${choice.question}</div>
                    ${preamble}
                    ${reflectivePrompt}
                    <div class="choice-buttons">
                        ${optionsHtml}
                    </div>
                </div>
                <div id="outcomeContainer"></div>
            `;
        }

        function selectOption(sceneId, choiceId, optionLabel, outcome) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choice = scene.choices.find(c => c.id === choiceId);

            // Record the choice
            gameState.choicesMade.push({
                sceneId,
                choiceId,
                choiceNum: choice.number,
                optionLabel: optionLabel
            });

            updateChoiceLog();
            saveGame();

            // Display outcome
            const outcomeHtml = `
                <div class="outcome-text">
                    <strong>${optionLabel}:</strong><br><br>
                    ${outcome}
                </div>
                <div id="nextContainer"></div>
            `;

            document.getElementById('outcomeContainer').innerHTML = outcomeHtml;

            // Determine what comes next
            const choiceIndex = scene.choices.findIndex(c => c.id === choiceId);
            const nextChoiceIndex = choiceIndex + 1;

            if (nextChoiceIndex < scene.choices.length) {
                // More choices in this scene
                document.getElementById('nextContainer').innerHTML = `
                    <button class="continue-btn continue-btn-next-choice" 
                        data-scene-id="${sceneId}" 
                        data-choice-index="${nextChoiceIndex}">Continue</button>
                `;
                gameState.currentChoiceIndex = nextChoiceIndex;
            } else {
                // End of this scene's choices - show scene ending
                document.getElementById('nextContainer').innerHTML = `
                    <button class="continue-btn continue-btn-scene-end" 
                        data-scene-id="${sceneId}">Continue</button>
                `;
            }

            window.scrollTo(0, 0);
        }

        function showNextChoice(sceneId, choiceIndex) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choiceHtml = renderChoice(scene, choiceIndex);
            document.getElementById('choiceContainer').innerHTML = choiceHtml;
            document.getElementById('outcomeContainer').innerHTML = '';
            window.scrollTo(0, 0);
        }

        function showSceneEnd(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);

            const endSceneHtml = `
                <div class="scene-end">
                    ${scene.endScene}
                </div>
            `;

            document.getElementById('choiceContainer').innerHTML = '';
            document.getElementById('outcomeContainer').innerHTML = endSceneHtml;

            const nextSceneId = sceneId + 1;
            if (nextSceneId <= storyData.scenes.length) {
                document.getElementById('choiceContainer').innerHTML += `
                    <button class="continue-btn continue-btn-scene-end" 
                        data-scene-id="${nextSceneId}">Continue to Next Scene</button>
                `;
            } else {
                document.getElementById('choiceContainer').innerHTML += `
                    <button class="continue-btn" id="showSummaryBtn">See Your Journey</button>
                `;
            }

            window.scrollTo(0, 0);
        }

        function showSummary() {
            let summaryHtml = `
                <h2>Your Learning Journey</h2>
                <p>You've reached the end of your story. Here are all the choices you made:</p>
                <div class="summary-list">
            `;

            const scenes = storyData.scenes;
            let currentScene = null;

            gameState.choicesMade.forEach(choice => {
                const scene = scenes.find(s => s.id === choice.sceneId);
                if (currentScene !== choice.sceneId) {
                    if (currentScene !== null) {
                        summaryHtml += `</div>`;
                    }
                    summaryHtml += `<div class="summary-scene">${scene.title}</div><div style="padding-left: 10px;">`;
                    currentScene = choice.sceneId;
                }
                summaryHtml += `
                    <div class="summary-choice">
                        <strong>Choice ${choice.choiceNum}:</strong> ${choice.optionLabel}
                    </div>
                `;
            });

            if (currentScene !== null) {
                summaryHtml += `</div>`;
            }

            summaryHtml += `
                </div>
                <div class="closing-note">
                    ${closingNote}
                </div>
                <button class="continue-btn" id="restartGameBtn">Play Again</button>
            `;

            document.getElementById('mainContent').innerHTML = summaryHtml;
            window.scrollTo(0, 0);
        }

        function updateChoiceLog() {
            const logHtml = gameState.choicesMade.map(choice => {
                const scene = storyData.scenes.find(s => s.id === choice.sceneId);
                return `
                    <div class="choice-log-item">
                        <span class="choice-log-label">${scene.title} — Choice ${choice.choiceNum}</span>
                        <span class="choice-log-answer">${choice.optionLabel}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('choiceLog').innerHTML = logHtml || '<p style="color: #999; font-size: 13px;">Your choices will appear here.</p>';
        }

        // ============================================================================
        // NAVIGATION & STARTUP
        // ============================================================================

        function startGame() {
            gameState = {
                currentView: 'welcome',
                currentSceneId: null,
                currentChoiceIndex: 0,
                choicesMade: [],
                outcomesRevealed: false
            };
            clearSavedGame();
            renderScene(1);
        }

        function restartGame() {
            startGame();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        document.addEventListener('DOMContentLoaded', () => {
            // Try to load saved game
            if (loadGame() && gameState.choicesMade.length > 0) {
                // Resume the game at the appropriate point
                const lastScene = gameState.choicesMade[gameState.choicesMade.length - 1].sceneId;
                updateChoiceLog();
                renderScene(lastScene);
            } else {
                // Show welcome screen
                renderWelcome();
            }
        });

        // Autosave every 5 seconds when game is active
        setInterval(() => {
            if (gameState.choicesMade.length > 0) {
                saveGame();
            }
        }, AUTOSAVE_INTERVAL);
    </script>
</body>
</html>
