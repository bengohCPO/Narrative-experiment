            ]
        };

        const closingNote = "Throughout this game, you were never asked to get the \"right\" answer. You were asked to make choices — and to notice, even briefly, why you made them.\n\nThat noticing — that metacognition — is the most important skill you're learning. Not the Math. Not the research methods. Not the presentations. But the ability to watch yourself think, to ask why you chose what you chose, to see how your choices shape who you're becoming.\n\nGabriel's journey through school is over. But yours is just beginning. The choices you make in the next few years — about what you study, who you work with, what you care about — will shape the person you become. Make them consciously. And notice. That's everything.";

        // ============================================================================
        // GAME STATE
        // ============================================================================

        let gameState = {
            currentSceneId: null,
            choicesMade: []
        };

        // ============================================================================
        // RENDER FUNCTIONS
        // ============================================================================

        function renderWelcome() {
            const content = `
                <div class="welcome-screen">
                    <h1>${storyData.welcome.title}</h1>
                    <p class="subtitle">${storyData.welcome.subtitle}</p>
                    <div class="section-divider"></div>
                    <h2>How to Play</h2>
                    <div class="how-to-play">
                        ${storyData.welcome.howToPlay.map(p => `<p>${p}</p>`).join('')}
                    </div>
                    <button class="continue-btn" onclick="startGame()">Begin Your Journey</button>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = content;
            document.getElementById('sidebar').innerHTML = '<div class="sidebar-title">Your Choices</div><div class="choice-log" id="choiceLog"><p style="color: #999; font-size: 13px;">Your choices will appear here.</p></div>';
            window.scrollTo(0, 0);
        }

        function renderScene(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            if (!scene) return;

            gameState.currentSceneId = sceneId;

            const settingHtml = `<div class="scene-setting">${scene.setting}</div>`;
            const firstChoiceHtml = renderChoicePoint(scene, 0);

            const content = `
                <h2>${scene.title}</h2>
                ${settingHtml}
                <div id="gameFlow">${firstChoiceHtml}</div>
            `;

            document.getElementById('mainContent').innerHTML = content;
            window.scrollTo(0, 0);
        }

        function renderChoicePoint(scene, choiceIndex) {
            const choice = scene.choices[choiceIndex];
            if (!choice) return '';

            const preamble = choice.preamble ? `<p>${choice.preamble}</p>` : '';
            const reflectivePrompt = choice.reflectivePrompt ? `<div class="reflective-prompt">${choice.reflectivePrompt}</div>` : '';
            
            const optionsHtml = choice.options.map((opt, idx) => {
                const optionLetter = opt.label.split(':')[0].trim();
                // Escape special characters for safe HTML attribute insertion
                const escapedOutcome = opt.outcome
                    .replace(/\\/g, '\\\\')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
                
                return `
                    <button class="choice-btn" data-scene="${gameState.currentSceneId}" data-choice="${choiceIndex}" data-letter="${optionLetter}" data-outcome="${escapedOutcome}">
                        ${opt.label}
                    </button>
                `;
            }).join('');

            return `
                <div class="choice-point">
                    <div class="choice-question">${choice.question}</div>
                    ${preamble}
                    ${reflectivePrompt}
                    <div class="choice-buttons">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }

        function selectOption(sceneId, choiceIndex, optionLetter, outcome) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choice = scene.choices[choiceIndex];

            // Record the choice
            gameState.choicesMade.push({
                sceneId,
                choiceNum: choice.number,
                optionLabel: optionLetter
            });

            updateChoiceLog();

            // Display outcome
            const outcomeHtml = `
                <div class="outcome-text">
                    <strong>${optionLetter}:</strong><br><br>
                    ${outcome}
                </div>
            `;

            // Check if there are more choices in this scene
            const nextChoiceIndex = choiceIndex + 1;
            const hasMoreChoices = nextChoiceIndex < scene.choices.length;

            let continueButton = '';
            if (hasMoreChoices) {
                continueButton = `<button class="continue-btn" onclick="showNextChoice(${sceneId}, ${nextChoiceIndex})">Continue</button>`;
            } else {
                continueButton = `<button class="continue-btn" onclick="showSceneEnd(${sceneId})">Continue</button>`;
            }

            const fullHtml = outcomeHtml + continueButton;

            document.getElementById('gameFlow').innerHTML += fullHtml;
            window.scrollTo(0, 0);
        }

        function showNextChoice(sceneId, choiceIndex) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choiceHtml = renderChoicePoint(scene, choiceIndex);
            document.getElementById('gameFlow').innerHTML += choiceHtml;
            attachChoiceListeners();
            window.scrollTo(0, 0);
        }

        function showSceneEnd(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const endSceneHtml = `<div class="scene-end">${scene.endScene}</div>`;

            const nextSceneId = sceneId + 1;
            let continueButton = '';

            if (nextSceneId <= 3) {
                continueButton = `<button class="continue-btn" onclick="renderScene(${nextSceneId})">Continue to Next Scene</button>`;
            } else {
                continueButton = `<button class="continue-btn" onclick="showSummary()">See Your Journey</button>`;
            }

            document.getElementById('gameFlow').innerHTML += endSceneHtml + continueButton;
            window.scrollTo(0, 0);
        }

        function showSummary() {
            let summaryHtml = `
                <h2>Your Learning Journey</h2>
                <p>You've reached the end of your story. Here are all the choices you made:</p>
                <div class="summary-list">
            `;

            const scenes = storyData.scenes;
            let currentScene = null;

            gameState.choicesMade.forEach(choice => {
                const scene = scenes.find(s => s.id === choice.sceneId);
                if (currentScene !== choice.sceneId) {
                    if (currentScene !== null) {
                        summaryHtml += `</div>`;
                    }
                    summaryHtml += `<div class="summary-scene">${scene.title}</div><div style="padding-left: 10px;">`;
                    currentScene = choice.sceneId;
                }
                summaryHtml += `
                    <div class="summary-choice">
                        <strong>Choice ${choice.choiceNum}:</strong> ${choice.optionLabel}
                    </div>
                `;
            });

            if (currentScene !== null) {
                summaryHtml += `</div>`;
            }

            summaryHtml += `
                </div>
                <div class="closing-note">
                    ${closingNote}
                </div>
            `;

            document.getElementById('mainContent').innerHTML = summaryHtml;
            window.scrollTo(0, 0);
        }

        function updateChoiceLog() {
            const logHtml = gameState.choicesMade.map(choice => {
                const scene = storyData.scenes.find(s => s.id === choice.sceneId);
                return `
                    <div class="choice-log-item">
                        <span class="choice-log-label">${scene.title} — Choice ${choice.choiceNum}</span>
                        <span class="choice-log-answer">${choice.optionLabel}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('choiceLog').innerHTML = logHtml || '<p style="color: #999; font-size: 13px;">Your choices will appear here.</p>';
        }

        function attachChoiceListeners() {
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.removeEventListener('click', handleChoiceClick);
                btn.addEventListener('click', handleChoiceClick);
            });
        }

        function handleChoiceClick(e) {
            const btn = e.target;
            const sceneId = parseInt(btn.dataset.scene);
            const choiceIndex = parseInt(btn.dataset.choice);
            const optionLetter = btn.dataset.letter;
            const outcome = btn.dataset.outcome;
            
            selectOption(sceneId, choiceIndex, optionLetter, outcome);
        }

        // ============================================================================
        // NAVIGATION & STARTUP
        // ============================================================================

        function startGame() {
            renderScene(1);
            attachChoiceListeners();
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            renderWelcome();
            attachChoiceListeners();
        });
    </script>
</body>
</html>
