<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Learning Journey: A Story of Gabriel — and You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #ede8e0 100%);
            color: #2c3e50;
            line-height: 1.8;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .main-content {
            flex: 1;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .sidebar {
            width: 280px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a5f7a;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 15px;
            border-bottom: 2px solid #1a5f7a;
            padding-bottom: 10px;
        }

        .choice-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 13px;
        }

        .choice-log-item {
            padding: 8px 10px;
            background: #f0f4f8;
            border-left: 3px solid #d4a574;
            border-radius: 4px;
            color: #2c3e50;
        }

        .choice-log-label {
            font-weight: 600;
            color: #1a5f7a;
            display: block;
            margin-bottom: 2px;
        }

        .choice-log-answer {
            color: #555;
            font-style: italic;
        }

        h1 {
            font-size: 2.5em;
            color: #1a5f7a;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        h2 {
            font-size: 1.8em;
            color: #1a5f7a;
            margin: 30px 0 20px 0;
        }

        h3 {
            font-size: 1.3em;
            color: #2c5f7a;
            margin: 20px 0 15px 0;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            font-style: italic;
            margin-bottom: 30px;
        }

        p {
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.8;
        }

        .scene-setting {
            background: linear-gradient(135deg, #f9f7f4 0%, #f5f1e8 100%);
            padding: 20px;
            border-left: 4px solid #1a5f7a;
            margin: 25px 0;
            border-radius: 6px;
            font-style: italic;
            color: #2c3e50;
        }

        .reflective-prompt {
            background: linear-gradient(135deg, #fef3e6 0%, #fde9d8 100%);
            padding: 18px;
            border-left: 4px solid #d4a574;
            margin: 20px 0;
            border-radius: 6px;
            font-style: italic;
            color: #5a4a3a;
            font-size: 15px;
        }

        .outcome-text {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
            border-left: 4px solid #d4a574;
            line-height: 1.8;
        }

        .scene-end {
            background: linear-gradient(135deg, #eef7f9 0%, #e5f2f6 100%);
            padding: 25px;
            border-radius: 8px;
            margin: 30px 0;
            border-left: 4px solid #1a5f7a;
            font-size: 16px;
            line-height: 1.8;
        }

        .choice-point {
            margin: 30px 0;
            padding: 20px;
            background: #f5f8fa;
            border-radius: 8px;
        }

        .choice-question {
            font-size: 1.1em;
            font-weight: 600;
            color: #1a5f7a;
            margin-bottom: 15px;
        }

        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .choice-btn {
            background: #1a5f7a;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-weight: 500;
        }

        .choice-btn:hover {
            background: #15495e;
            transform: translateX(4px);
            box-shadow: 0 4px 8px rgba(26, 95, 122, 0.2);
        }

        .choice-btn:active {
            background: #0f3545;
        }

        .continue-btn {
            background: #d4a574;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-weight: 600;
        }

        .continue-btn:hover {
            background: #c89560;
            box-shadow: 0 4px 8px rgba(212, 165, 116, 0.3);
        }

        .section-divider {
            margin: 40px 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #1a5f7a, transparent);
            border: none;
        }

        .welcome-screen {
            text-align: center;
            padding: 60px 40px;
        }
