                                {
                                    label: "B: Write about the moments that were hardest — and what you learned from not giving up on them.",
                                    outcome: "Your reflection is honest and a little raw. Ms Tan reads it carefully. \"This is the kind of reflection that takes courage,\" she says. \"You've learned something most people take much longer to learn — that difficulty is information, not failure.\""
                                },
                                {
                                    label: "C: Write about who you are becoming — what kind of learner, what kind of person, and what kind of future you're starting to imagine for yourself.",
                                    outcome: "Your reflection is the hardest to write, but the most yours. You write about the boy who was confused by shapes in Primary 5, and the teenager who is now genuinely excited about how science can help communities live more sustainably. Ms Tan writes in the margin: *\"This is what self-directed learning looks like when it works.\"*"
                                }
                            ],
                            reflectivePrompt: "What feels most true to where you are right now?"
                        }
                    ],
                    endScene: "You close your portfolio. Andy is still writing beside you, his pen moving steadily. Outside the library window, the school is going about its afternoon — students heading to CCA, a teacher crossing the courtyard, the distant sound of a canteen in full swing.\n\nYou don't have everything figured out. But you know more about how you learn, what you care about, and where you want to go than you did three years ago. That's not nothing. That might, in fact, be everything."
                }
            ]
        };

        const closingNote = "Throughout this game, you were never asked to get the \"right\" answer. You were asked to make choices — and to notice, even briefly, why you made them.\n\nThat noticing is the point. It's what Gabriel was learning to do, across every scene. And it's what self-directed learning actually looks like: not a perfect plan, but a growing awareness of yourself as someone who learns, adapts, reflects, and keeps going.\n\nWhat kind of learner are you becoming?";

        // ============================================================================
        // GAME STATE
        // ============================================================================

        let gameState = {
            currentView: 'welcome',
            currentSceneId: null,
            currentChoiceIndex: 0,
            choicesMade: [], // Array of { sceneId, choiceId, choiceNum, optionLabel }
            outcomesRevealed: false
        };

        // ============================================================================
        // RENDER FUNCTIONS
        // ============================================================================

        function renderWelcome() {
            const content = `
                <div class="welcome-screen">
                    <h1>${storyData.welcome.title}</h1>
                    <p class="subtitle">${storyData.welcome.subtitle}</p>
                    <div class="section-divider"></div>
                    <h2>How to Play</h2>
                    <div class="how-to-play">
                        ${storyData.welcome.howToPlay.map(p => `<p>${p}</p>`).join('')}
                    </div>
                    <button class="continue-btn" onclick="startGame()">Begin Your Journey</button>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = content;
            document.getElementById('sidebar').innerHTML = '<div class="sidebar-title">Your Choices</div><div class="choice-log" id="choiceLog"><p style="color: #999; font-size: 13px;">Your choices will appear here.</p></div>';
            window.scrollTo(0, 0);
        }

        function renderScene(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            if (!scene) return;

            gameState.currentSceneId = sceneId;
            gameState.currentChoiceIndex = 0;
            gameState.outcomesRevealed = false;

            const settingHtml = `<div class="scene-setting">${scene.setting}</div>`;
            const choiceHtml = renderChoice(scene, 0);

            const content = `
                <h2>${scene.title}</h2>
                ${settingHtml}
                <div id="choiceContainer">${choiceHtml}</div>
            `;

            document.getElementById('mainContent').innerHTML = content;
            window.scrollTo(0, 0);
        }

        function renderChoice(scene, choiceIndex) {
            const choice = scene.choices[choiceIndex];
            if (!choice) return '';

            const preamble = choice.preamble ? `<p>${choice.preamble}</p>` : '';
            const reflectivePrompt = choice.reflectivePrompt ? `<div class="reflective-prompt">${choice.reflectivePrompt}</div>` : '';
            const optionsHtml = choice.options.map((opt, idx) => `
                <button class="choice-btn" onclick="selectOption(${gameState.currentSceneId}, ${choice.id}, '${opt.label.split(':')[0].trim()}', '${escapeHtml(opt.label)}', '${escapeHtml(opt.outcome)}')">
                    ${opt.label}
                </button>
            `).join('');

            return `
                <div class="choice-point">
                    <div class="choice-question">${choice.question}</div>
                    ${preamble}
                    ${reflectivePrompt}
                    <div class="choice-buttons">
                        ${optionsHtml}
                    </div>
                </div>
                <div id="outcomeContainer"></div>
            `;
        }

        function selectOption(sceneId, choiceId, optionLetter, optionLabel, outcome) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choice = scene.choices.find(c => c.id === choiceId);

            // Record the choice
            gameState.choicesMade.push({
                sceneId,
                choiceId,
                choiceNum: choice.number,
                optionLabel: optionLabel
            });

            updateChoiceLog();

            // Display outcome
            const outcomeHtml = `
                <div class="outcome-text">
                    <strong>${optionLabel}:</strong><br><br>
                    ${outcome}
                </div>
                <div id="nextContainer"></div>
            `;

            document.getElementById('outcomeContainer').innerHTML = outcomeHtml;

            // Determine what comes next
            const choiceIndex = scene.choices.findIndex(c => c.id === choiceId);
            const nextChoiceIndex = choiceIndex + 1;

            if (nextChoiceIndex < scene.choices.length) {
                // More choices in this scene
                const nextChoiceHtml = renderChoice(scene, nextChoiceIndex);
                document.getElementById('nextContainer').innerHTML = `
                    <button class="continue-btn" onclick="showNextChoice(${sceneId}, ${nextChoiceIndex})">Continue</button>
                `;
                gameState.currentChoiceIndex = nextChoiceIndex;
            } else {
                // End of this scene's choices - show scene ending
                document.getElementById('nextContainer').innerHTML = `
                    <button class="continue-btn" onclick="showSceneEnd(${sceneId})">Continue</button>
                `;
            }

            window.scrollTo(0, 0);
        }

        function showNextChoice(sceneId, choiceIndex) {
            const scene = storyData.scenes.find(s => s.id === sceneId);
            const choiceHtml = renderChoice(scene, choiceIndex);
            document.getElementById('choiceContainer').innerHTML = choiceHtml;
            document.getElementById('outcomeContainer').innerHTML = '';
            window.scrollTo(0, 0);
        }

        function showSceneEnd(sceneId) {
            const scene = storyData.scenes.find(s => s.id === sceneId);

            const endSceneHtml = `
                <div class="scene-end">
                    ${scene.endScene}
                </div>
            `;

            document.getElementById('choiceContainer').innerHTML = '';
            document.getElementById('outcomeContainer').innerHTML = endSceneHtml;

            const nextSceneId = sceneId + 1;
            if (nextSceneId <= storyData.scenes.length) {
                document.getElementById('choiceContainer').innerHTML += `
                    <button class="continue-btn" onclick="renderScene(${nextSceneId})">Continue to Next Scene</button>
                `;
            } else {
                document.getElementById('choiceContainer').innerHTML += `
                    <button class="continue-btn" onclick="showSummary()">See Your Journey</button>
                `;
            }

            window.scrollTo(0, 0);
        }

        function showSummary() {
            let summaryHtml = `
                <h2>Your Learning Journey</h2>
                <p>You've reached the end of your story. Here are all the choices you made:</p>
                <div class="summary-list">
            `;

            const scenes = storyData.scenes;
            let currentScene = null;

            gameState.choicesMade.forEach(choice => {
                const scene = scenes.find(s => s.id === choice.sceneId);
                if (currentScene !== choice.sceneId) {
                    if (currentScene !== null) {
                        summaryHtml += `</div>`;
                    }
                    summaryHtml += `<div class="summary-scene">${scene.title}</div><div style="padding-left: 10px;">`;
                    currentScene = choice.sceneId;
                }
                summaryHtml += `
                    <div class="summary-choice">
                        <strong>Choice ${choice.choiceNum}:</strong> ${choice.optionLabel}
                    </div>
                `;
            });

            if (currentScene !== null) {
                summaryHtml += `</div>`;
            }

            summaryHtml += `
                </div>
                <div class="closing-note">
                    ${closingNote}
                </div>
            `;

            document.getElementById('mainContent').innerHTML = summaryHtml;
            window.scrollTo(0, 0);
        }

        function updateChoiceLog() {
            const logHtml = gameState.choicesMade.map(choice => {
                const scene = storyData.scenes.find(s => s.id === choice.sceneId);
                return `
                    <div class="choice-log-item">
                        <span class="choice-log-label">${scene.title} — Choice ${choice.choiceNum}</span>
                        <span class="choice-log-answer">${choice.optionLabel}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('choiceLog').innerHTML = logHtml || '<p style="color: #999; font-size: 13px;">Your choices will appear here.</p>';
        }

        // ============================================================================
        // NAVIGATION & STARTUP
        // ============================================================================

        function startGame() {
            renderScene(1);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', renderWelcome);
    </script>
</body>
</html>
